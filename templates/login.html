{% extends "base.html" %}
{% block title %}登录 - PVZH 云端工坊{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow duration-300">
        
        <div class="text-center mb-8">
            <span class="material-symbols-rounded text-blue-600 text-5xl mb-2">account_circle</span>
            <h2 class="text-2xl font-extrabold text-gray-900">登录工坊社区</h2>
            <p class="text-gray-500 mt-2 text-sm">与全球植物僵尸玩家交流魔改心得</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-100 text-red-600 rounded-xl text-sm text-center flex items-center justify-center">
            <span class="material-symbols-rounded text-base mr-1">error</span> {{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="mb-4 p-3 bg-green-50 border border-green-100 text-green-600 rounded-xl text-sm text-center flex items-center justify-center">
            <span class="material-symbols-rounded text-base mr-1">check_circle</span> {{ success }}
        </div>
        {% endif %}

        <form action="/login" method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">邮箱账号</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="material-symbols-rounded text-gray-400 text-sm">mail</span>
                    </div>
                    <input type="email" name="email" required placeholder="example@email.com"
                           class="w-full pl-10 pr-4 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">密码</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="material-symbols-rounded text-gray-400 text-sm">lock</span>
                    </div>
                    <input type="password" name="password" required placeholder="至少 6 位密码" minlength="6"
                           class="w-full pl-10 pr-4 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none">
                </div>
            </div>
            
            <div class="flex gap-4 pt-2">
                <button type="submit" name="action" value="login" 
                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-2xl transition duration-200 shadow-sm active:scale-[0.98]">
                    登 录
                </button>
                <button type="submit" name="action" value="register" 
                        class="flex-1 bg-white hover:bg-gray-50 text-gray-700 font-bold py-3.5 border border-gray-200 rounded-2xl transition duration-200 shadow-sm active:scale-[0.98]">
                    注 册
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
