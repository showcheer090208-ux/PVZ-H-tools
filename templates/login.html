{% extends "base.html" %}
{% block title %}登录 - PVZH 云端工坊{% endblock %}

{% block content %}
<script>
    // 清理残留状态
    localStorage.clear();
    sessionStorage.clear();
</script>

<div class="min-h-[85vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50/50">
    <!-- Google 风格卡片 -->
    <div class="max-w-md w-full bg-white rounded-3xl p-8 sm:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100">
        
        <!-- 头部 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-50 text-blue-600 mb-4">
                <span class="material-symbols-rounded text-4xl">eco</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 tracking-tight">PVZH 云端工坊</h2>
            <p class="text-gray-500 mt-2 text-sm">欢迎指挥官，探索并分享你的游戏魔改</p>
        </div>

        <!-- 错误或成功提示 -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-sm flex items-start">
            <span class="material-symbols-rounded text-lg mr-2 shrink-0">error</span> 
            <span class="leading-relaxed">{{ error }}</span>
        </div>
        {% endif %}
        {% if success %}
        <div class="mb-6 p-4 bg-green-50 text-green-700 rounded-2xl text-sm flex items-start">
            <span class="material-symbols-rounded text-lg mr-2 shrink-0">check_circle</span> 
            <span class="leading-relaxed">{{ success }}</span>
        </div>
        {% endif %}

        <!-- Tab 切换 -->
        <div class="flex p-1 mb-8 bg-gray-100 rounded-2xl">
            <button id="tabLoginBtn" onclick="switchTab('login')" type="button" 
                    class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 {% if not show_register %}bg-white text-blue-600 shadow-sm{% else %}text-gray-500 hover:text-gray-700{% endif %}">
                登 录
            </button>
            <button id="tabRegisterBtn" onclick="switchTab('register')" type="button" 
                    class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 {% if show_register %}bg-white text-blue-600 shadow-sm{% else %}text-gray-500 hover:text-gray-700{% endif %}">
                注 册
            </button>
        </div>

        <!-- ================= 登录表单 ================= -->
        <form id="loginForm" action="/login" method="post" class="space-y-5 {% if show_register %}hidden{% endif %}" onsubmit="return handleFormSubmit(this, 'loginSubmitBtn')">
            <input type="hidden" name="action" value="login">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">邮箱账号</label>
                <input type="email" name="email" required placeholder="name@example.com"
                       class="w-full px-4 py-3 rounded-2xl bg-gray-50 border-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">密码</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-2xl bg-gray-50 border-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>

            <div class="flex items-center justify-between px-1 mt-2">
                <label class="flex items-center text-sm text-gray-600 cursor-pointer group">
                    <div class="relative flex items-center">
                        <input type="checkbox" name="remember_me" value="true" checked class="sr-only peer">
                        <div class="w-5 h-5 bg-gray-100 border border-gray-300 rounded peer-checked:bg-blue-600 peer-checked:border-blue-600 transition-colors flex items-center justify-center">
                            <span class="material-symbols-rounded text-white text-[14px] opacity-0 peer-checked:opacity-100">check</span>
                        </div>
                    </div>
                    <span class="ml-2 group-hover:text-gray-900 transition-colors">保持登录状态 (7天)</span>
                </label>
            </div>
            
            <button type="submit" id="loginSubmitBtn" 
                    class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-2xl transition duration-200 active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center">
                <span>进入工坊</span>
            </button>
        </form>

        <!-- ================= 注册表单 ================= -->
        <form id="registerForm" action="/login" method="post" class="space-y-4 {% if not show_register %}hidden{% endif %}" onsubmit="return handleFormSubmit(this, 'registerSubmitBtn')">
            <input type="hidden" name="action" value="register">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">社区邀请码 <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="text" name="invitation_code" required placeholder="PVZH-XXXXXX"
                           class="w-full px-4 py-3 rounded-2xl bg-gray-50 border-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none uppercase font-mono tracking-wide">
                    <div class="absolute right-4 top-2.5 text-xs text-blue-600 font-medium bg-blue-50 px-2 py-1.5 rounded-lg pointer-events-none">凭证获取</div>
                </div>
                <p class="text-[11px] text-gray-400 mt-1 ml-1">获取方式：官方群公告或老玩家邀请</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">设置昵称</label>
                <input type="text" name="username" required placeholder="展示在发帖与评论中" minlength="2" maxlength="15"
                       class="w-full px-4 py-3 rounded-2xl bg-gray-50 border-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">绑定邮箱</label>
                <input type="email" name="email" required placeholder="建议使用真实邮箱"
                       class="w-full px-4 py-3 rounded-2xl bg-gray-50 border-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">密码</label>
                    <input type="password" name="password" id="regPassword" required placeholder="至少 6 位" minlength="6"
                           class="w-full px-4 py-3 rounded-2xl bg-gray-50 border-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">确认密码</label>
                    <input type="password" name="confirm_password" id="regConfirmPassword" required placeholder="再输一次" minlength="6"
                           class="w-full px-4 py-3 rounded-2xl bg-gray-50 border-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
            </div>
            <p id="pwdError" class="text-xs text-red-500 ml-1 hidden mt-1">两次输入的密码不一致！</p>
            
            <button type="submit" id="registerSubmitBtn" 
                    class="w-full mt-6 bg-gray-900 hover:bg-black text-white font-semibold py-3.5 rounded-2xl transition duration-200 active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center">
                <span>立即注册账号</span>
            </button>
        </form>
    </div>
</div>

<script>
    function switchTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginBtn = document.getElementById('tabLoginBtn');
        const registerBtn = document.getElementById('tabRegisterBtn');

        const activeClass = ['bg-white', 'text-blue-600', 'shadow-sm'];
        const inactiveClass = ['text-gray-500'];

        if (tab === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            
            loginBtn.classList.add(...activeClass);
            loginBtn.classList.remove(...inactiveClass);
            registerBtn.classList.remove(...activeClass);
            registerBtn.classList.add(...inactiveClass);
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            
            registerBtn.classList.add(...activeClass);
            registerBtn.classList.remove(...inactiveClass);
            loginBtn.classList.remove(...activeClass);
            loginBtn.classList.add(...inactiveClass);
        }
    }

    function handleFormSubmit(form, btnId) {
        if (form.id === 'registerForm') {
            const pwd = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPassword').value;
            const pwdError = document.getElementById('pwdError');
            
            if (pwd !== confirmPwd) {
                pwdError.classList.remove('hidden');
                document.getElementById('regConfirmPassword').focus();
                return false;
            } else {
                pwdError.classList.add('hidden');
            }
        }

        const btn = document.getElementById(btnId);
        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-rounded animate-spin mr-2 text-lg">progress_activity</span> 处理中...`;
        
        return true;
    }
</script>
{% endblock %}
