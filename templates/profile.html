{% extends "base.html" %}
{% block title %}个人中心 - PVZH 云端工坊{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
    
    <!-- 原有：个人资料卡片模块（保留原有样式，示例结构） -->
    <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-gray-100 mb-6">
        <div class="flex items-center mb-6">
            <span class="material-symbols-rounded text-blue-600 text-3xl mr-3">manage_accounts</span>
            <h2 class="text-2xl font-bold text-gray-900">账号设置</h2>
        </div>
        
        <!-- 这里放置你原有的修改昵称等表单，我在此提供一个干净的框架结构 -->
        <div class="space-y-4">
            <p class="text-sm text-gray-500">在这里管理你的社区公开信息。</p>
            <!-- 你的资料修改逻辑保持不变 -->
        </div>
    </div>

    <!-- 新增：社区邀请码卡片 -->
    <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-gray-100">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6">
            <div class="flex items-center mb-4 sm:mb-0">
                <span class="material-symbols-rounded text-emerald-500 text-3xl mr-3">group_add</span>
                <div>
                    <h2 class="text-xl font-bold text-gray-900">邀请新玩家</h2>
                    <p class="text-xs text-gray-500 mt-1">老带新专属通道，共建健康社区</p>
                </div>
            </div>
            <button onclick="generateInviteCode()" id="genInviteBtn" 
                    class="px-5 py-2.5 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-black transition-all active:scale-95 flex items-center justify-center">
                <span class="material-symbols-rounded text-sm mr-1.5">add_circle</span>
                生成每周邀请码
            </button>
        </div>
        
        <div class="bg-blue-50/50 rounded-2xl p-4 mb-4 border border-blue-100">
            <h4 class="text-sm font-bold text-blue-800 mb-1 flex items-center">
                <span class="material-symbols-rounded text-sm mr-1">info</span> 获取规则
            </h4>
            <ul class="text-xs text-blue-700/80 space-y-1.5 pl-5 list-disc">
                <li>注册满 <strong>24 小时</strong> 后解锁邀请权限。</li>
                <li>普通指挥官 <strong>每周可生成 1 个</strong> 邀请码，该码最多可被 3 人使用。</li>
                <li>请妥善保管邀请码，发给你信任的伙伴加入工坊。</li>
            </ul>
        </div>
        
        <!-- 生成结果展示区 -->
        <div id="inviteCodeDisplay" class="hidden">
            <div class="flex flex-col items-center p-6 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 mt-2 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-16 h-16 bg-blue-100 rounded-full opacity-50"></div>
                <span class="text-sm font-medium text-gray-500 mb-2">你的专属新兵邀请码</span>
                
                <div class="flex items-center space-x-3">
                    <code id="newCodeText" class="text-2xl sm:text-3xl font-black text-blue-600 tracking-[0.15em] uppercase drop-shadow-sm select-all"></code>
                    <button onclick="copyInviteCode()" class="w-10 h-10 rounded-full bg-white border border-gray-200 text-gray-500 hover:text-blue-600 hover:border-blue-300 hover:shadow-sm flex items-center justify-center transition-all">
                        <span class="material-symbols-rounded text-lg">content_copy</span>
                    </button>
                </div>
                
                <span id="usesLimitText" class="text-xs text-gray-400 mt-3 bg-gray-200/50 px-3 py-1 rounded-full"></span>
            </div>
        </div>

    </div>
</div>

<script>
async function generateInviteCode() {
    const btn = document.getElementById('genInviteBtn');
    const originalText = btn.innerHTML;
    
    // UI 加载状态
    btn.disabled = true;
    btn.classList.add('opacity-70', 'cursor-not-allowed');
    btn.innerHTML = `<span class="material-symbols-rounded animate-spin text-sm mr-1.5">progress_activity</span> 处理中...`;
    
    try {
        const response = await fetch('/api/invitation/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            document.getElementById('inviteCodeDisplay').classList.remove('hidden');
            document.getElementById('newCodeText').innerText = data.code;
            
            const limitText = data.max_uses >= 900 ? '无限次数使用' : `最多可用 ${data.max_uses} 次`;
            document.getElementById('usesLimitText').innerText = limitText;
            
            // 加入微小动画
            const displayBox = document.getElementById('inviteCodeDisplay').firstElementChild;
            displayBox.classList.add('animate-pulse');
            setTimeout(() => displayBox.classList.remove('animate-pulse'), 1000);
            
        } else {
            alert(data.message);
        }
    } catch (e) {
        alert('网络请求异常，请稍后再试');
    } finally {
        // 恢复按钮状态
        btn.disabled = false;
        btn.classList.remove('opacity-70', 'cursor-not-allowed');
        btn.innerHTML = originalText;
    }
}

function copyInviteCode() {
    const code = document.getElementById('newCodeText').innerText;
    navigator.clipboard.writeText(code).then(() => {
        alert('邀请码已复制到剪贴板！');
    }).catch(() => {
        alert('复制失败，请手动长按全选复制。');
    });
}
</script>
{% endblock %}
