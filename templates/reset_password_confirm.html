{% extends "base.html" %}
{% block title %}重置密码 - PVZH 云端工坊{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-lg border border-gray-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-50 text-indigo-600 mb-4">
                <span class="material-symbols-rounded text-4xl">lock_reset</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">设置新密码</h2>
            <p class="text-gray-500 mt-2 text-sm">请为您的账号设置一个新密码</p>
        </div>

        {% if error %}
        <div class="mb-6 bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-6 bg-green-50 text-green-700 px-4 py-3 rounded-xl text-sm">
            {{ success }}
        </div>
        {% endif %}

        <form method="POST" onsubmit="return validateForm()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">新密码</label>
                    <input type="password" id="password" name="password" required minlength="6"
                           class="w-full px-4 py-3 bg-gray-50 rounded-2xl ring-1 ring-gray-200 focus:ring-2 focus:ring-indigo-500 transition-all">
                    <p class="text-xs text-gray-400 mt-1">至少 6 位字符</p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">确认新密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                           class="w-full px-4 py-3 bg-gray-50 rounded-2xl ring-1 ring-gray-200 focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

                <button type="submit"
                        class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-2xl transition-all">
                    确认重置密码
                </button>
            </div>
        </form>

        <div class="text-center mt-6">
            <a href="/login" class="text-sm text-gray-500 hover:text-gray-700">返回登录</a>
        </div>
    </div>
</div>

<script>
    // 从 URL 获取 access_token
    const urlParams = new URLSearchParams(window.location.search);
    const accessToken = urlParams.get('access_token');

    if (!accessToken) {
        document.querySelector('form').innerHTML = '<div class="text-red-500 text-center">无效的重置链接，请重新发送重置邮件。</div>';
    }

    function validateForm() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        const errorMsg = document.getElementById('errorMsg');

        if (password.length < 6) {
            errorMsg.innerText = '密码长度至少需要 6 位';
            errorMsg.classList.remove('hidden');
            return false;
        }

        if (password !== confirm) {
            errorMsg.innerText = '两次输入的密码不一致';
            errorMsg.classList.remove('hidden');
            return false;
        }

        errorMsg.classList.add('hidden');
        return true;
    }

    // 表单提交时携带 token
    const form = document.querySelector('form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const password = document.getElementById('password').value;
        
        const response = await fetch('/api/reset-password/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                access_token: accessToken,
                password: password
            })
        });

        const result = await response.json();
        if (result.status === 'success') {
            window.location.href = '/login?reset=success';
        } else {
            document.getElementById('errorMsg').innerText = result.message;
            document.getElementById('errorMsg').classList.remove('hidden');
        }
    });
</script>
{% endblock %}
