<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}PVZH 魔改工坊{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#f8fafc] text-gray-800 min-h-screen flex flex-col antialiased">

    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14 md:h-16">
                <a href="/" class="flex items-center group">
                    <span class="material-symbols-rounded text-blue-600 text-[28px] md:text-[32px] mr-2 group-hover:rotate-12 transition-transform duration-300">build_circle</span>
                    <span class="font-extrabold text-lg md:text-xl tracking-tight text-gray-900 group-hover:text-blue-600 transition-colors">PVZH 工坊</span>
                </a>
                
                <div class="flex items-center">
                    <span class="text-xs text-gray-400 font-medium px-2 py-1 bg-gray-100 rounded-full hidden sm:block">v1.2.0 Beta</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-xs md:text-sm text-gray-400">
            Deployed on Render | Powered by UnityPy & Flask & Vue.js
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
