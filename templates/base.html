<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}PVZH 魔改工坊{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 适配苹果手机底部的安全距离 */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-[#f8fafc] text-gray-800 min-h-screen flex flex-col antialiased pb-16 md:pb-0"> 
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14 md:h-16">
                <a href="/" class="flex items-center group">
                    <span class="material-symbols-rounded text-blue-600 text-[28px] md:text-[32px] mr-2 group-hover:rotate-12 transition-transform duration-300">build_circle</span>
                    <span class="font-extrabold text-lg md:text-xl tracking-tight text-gray-900 group-hover:text-blue-600 transition-colors">PVZH 工坊</span>
                </a>
                
                <div class="flex items-center">
                    {% if current_user %}
                        <a href="/profile" class="flex items-center space-x-2 bg-gray-50 hover:bg-gray-100 rounded-full pr-3 pl-1 py-1 border border-gray-200 transition-colors duration-200">
                            <div class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs uppercase">
                                {{ current_user.username[0] }}
                            </div>
                            <span class="text-sm font-medium text-gray-700 hidden sm:block">{{ current_user.username }}</span>
                        </a>
                    {% else %}
                        <a href="/login" class="text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-full transition-colors duration-200 shadow-sm active:scale-95">登录</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto relative z-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="hidden md:block bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-xs text-gray-400">
            Deployed on Render | Powered by UnityPy & Flask & Vue.js
        </div>
    </footer>

    <nav class="md:hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 z-50 pb-safe">
        <div class="flex justify-around items-center h-14 px-2">
            <a href="/" class="flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-500 hover:text-blue-600 active:text-blue-600">
                <span class="material-symbols-rounded text-[22px]">home</span>
                <span class="text-[10px] font-medium">大厅</span>
            </a>
            <a href="/forum" class="flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-500 hover:text-blue-600 active:text-blue-600">
                <span class="material-symbols-rounded text-[22px]">forum</span>
                <span class="text-[10px] font-medium">社区</span>
            </a>
            <a href="/deck-editor" class="flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-500 hover:text-blue-600 active:text-blue-600">
                <span class="material-symbols-rounded text-[22px]">style</span>
                <span class="text-[10px] font-medium">卡组</span>
            </a>
            <a href="/profile" class="flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-500 hover:text-blue-600 active:text-blue-600">
                <span class="material-symbols-rounded text-[22px]">person</span>
                <span class="text-[10px] font-medium">我的</span>
            </a>
        </div>
    </nav>

    {% block scripts %}{% endblock %}
</body>
</html>
